name: Backup PostgreSQL

on:
  schedule:
    - cron: '0 3 * * *'   # Chaque nuit à 3h UTC
  workflow_dispatch:        # Déclenchement manuel possible

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Installer pg_dump
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Créer le backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          STAMP=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          FILENAME="plm-fashion_${STAMP}.sql.gz"
          pg_dump "$DATABASE_URL" | gzip > "$FILENAME"
          echo "BACKUP_FILE=$FILENAME" >> $GITHUB_ENV
          SIZE=$(du -sh "$FILENAME" | cut -f1)
          echo "✅ Backup créé : $FILENAME ($SIZE)"

      - name: Uploader en artifact GitHub
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ env.BACKUP_FILE }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 30

      - name: Résumé
        run: |
          echo "### ✅ Backup DB terminé" >> $GITHUB_STEP_SUMMARY
          echo "- Fichier : \`$BACKUP_FILE\`" >> $GITHUB_STEP_SUMMARY
          echo "- Rétention : 30 jours" >> $GITHUB_STEP_SUMMARY
          echo "- Prochain backup automatique : demain 3h UTC" >> $GITHUB_STEP_SUMMARY
