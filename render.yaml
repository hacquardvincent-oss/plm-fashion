services:
  - type: web
    name: plm-fashion-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install
    # Le serveur démarre directement (pas de migration au boot) → réveil à froid rapide.
    # Les migrations/seeds se lancent à la demande via GitHub Actions (.github/workflows/seed.yml).
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      # DATABASE_URL est géré manuellement dans le dashboard Render (base Neon).
      # sync: false empêche le Blueprint d'écraser cette valeur au redéploiement.
      - key: DATABASE_URL
        sync: false
    healthCheckPath: /health

  - type: static
    name: plm-fashion
    rootDir: client
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://plm-fashion-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
