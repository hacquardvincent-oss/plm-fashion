services:
  - type: web
    name: plm-fashion-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run migrate && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: plm-fashion-db
          property: connectionString
    healthCheckPath: /health
