services:
  - type: web
    name: plm-fashion-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: npm run migrate && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: plm-fashion-db
          property: connectionString
    healthCheckPath: /health

  - type: static
    name: plm-fashion
    rootDir: client
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://plm-fashion-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
